<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>ES2IM - École Supérieure d'Informatique</title>
  <meta name="description" content="Site vitrine ES2IM" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="/assets/css/main.css" />
</head>
<body>
  <header class="container py-3">
    <h1>ES2IM</h1>
  </header>
  <main class="container">
    <h2>Contact</h2>
    <form id="contact-form">
      <div class="mb-3">
        <label class="form-label">Nom</label>
        <input type="text" name="name" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Téléphone</label>
        <input type="text" name="phone" class="form-control" />
      </div>
      <div class="mb-3">
        <label class="form-label">Message</label>
        <textarea name="message" class="form-control" rows="4" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Envoyer</button>
    </form>
    <div id="contact-msg" class="mt-3"></div>
  </main>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    $('#contact-form').on('submit', function(e){
      e.preventDefault();
      $.ajax({
        method: 'POST',
        url: '/api/leads',
        data: $(this).serialize(),
        headers: {'X-CSRF-Token': getCookie('XSRF-TOKEN')},
        success: function(){ $('#contact-msg').text('Merci!'); },
        error: function(){ $('#contact-msg').text('Erreur.'); }
      });
    });
    function getCookie(name){
      const v = document.cookie.match('(^|;) ?'+name+'=([^;]*)(;|$)');
      return v ? v[2] : null;
    }
  </script>
</body>
</html>
